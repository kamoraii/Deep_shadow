<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Star Wars</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        /* Conteneur 3D */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            perspective: 200px;
            perspective-origin: 50% 0%;
            overflow: hidden;
        }

        /* Texte en perspective */
        .crawl {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 100px;  /* Taille énorme fixe */
            font-weight: bold;
            line-height: 1.5;
            color: #FFD700;
            transform-origin: 50% 100%;
            transform: rotateX(30deg); /* Angle fort */
            animation: crawl 20s linear forwards;
        }

        @keyframes crawl {
            0% { top: 100%; }
            100% { top: -200%; }
        }

        p {
            margin: 0;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="crawl">
            <p>Longtemps avant que le monde ne s'allume…</p>
            <p>nous étions déjà là.</p>
            <p>Les mains dans le froid,</p>
            <p>les genoux dans la poussière,</p>
            <p>portant un univers entier qui n'avait pas le droit de vaciller.</p>
        </div>
    </div>
</body>
</html>
